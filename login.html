<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Karvo</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150"><rect width="150" height="150" rx="30" fill="%23202225"/><rect x="50" y="38" width="14" height="74" rx="7" fill="%23ffffff"/><polygon points="104,38 74,72 86,72 62,112 92,76 80,76" fill="%23f07032"/></svg>'>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#eeedea;--paper:#17181a;--card:#222427;--green:#f07032;--green-deep:#d85a1f;
    --muted:#a3a49e;--line:#2c2e33;--line2:#34373d;--clay:#e0664a;
    --grad:linear-gradient(135deg,#f58a4a,#e85d1f);--ring:rgba(240,112,50,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(700px 420px at 88% -10%, rgba(240,112,50,.16), transparent 60%),
      radial-gradient(800px 520px at -12% 40%, rgba(245,176,76,.08), transparent 60%),
      var(--paper);
  }
  .logo{display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.5rem;margin-bottom:30px;color:var(--ink);text-decoration:none}
  .logo-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2a2c30 60%,#1d1f22);display:grid;place-items:center;border:1.5px dashed rgba(255,217,59,.75)}
  .logo-mark svg{width:68%;height:68%}
  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  .tabs{display:flex;background:var(--paper);border-radius:999px;padding:5px;margin-bottom:26px}
  .tabs button{flex:1;border:none;background:none;color:var(--muted);font-family:inherit;font-weight:600;font-size:.92rem;padding:10px;border-radius:999px;cursor:pointer}
  .tabs button.on{background:var(--grad);color:#2a1300}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-size:1.4rem;margin-bottom:6px}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:22px}
  label{display:block;font-size:.85rem;font-weight:600;margin:14px 0 6px}
  input{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;font-family:inherit;font-size:.95rem;color:var(--ink)}
  input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--ring)}
  .btn{width:100%;margin-top:22px;border:none;border-radius:999px;padding:14px;font-family:inherit;font-weight:600;font-size:1rem;cursor:pointer;background:var(--grad);color:#2a1300;box-shadow:0 4px 16px rgba(240,112,50,.28);transition:filter .15s}
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.6;cursor:wait}
  .msg{margin-top:16px;font-size:.87rem;border-radius:10px;padding:12px 14px;display:none}
  .msg.err{display:block;background:#3a1c15;border:1px solid #6b3a2a;color:#f0b3a0}
  .msg.ok{display:block;background:#1e2b1c;border:1px solid #3f6b38;color:#8fd97f}
  .aux{margin-top:18px;text-align:center;font-size:.85rem;color:var(--muted)}
  .aux button{background:none;border:none;color:var(--green);font-family:inherit;font-size:.85rem;cursor:pointer;font-weight:600}
  .aux button:hover{text-decoration:underline}
</style>
</head>
<body>
  <a class="logo" href="index.html">
    <span class="logo-mark"><svg viewBox="30 25 90 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="42" y="34" width="15" height="82" rx="7.5" fill="#ffffff"/><polygon points="104,32 71,70 84,70 58,118 91,74 78,74" fill="#f07032"/></svg></span>
    Karvo
  </a>

  <div class="card">
    <div class="tabs">
      <button id="tabLogin" class="on" onclick="setMode('login')">Log in</button>
      <button id="tabSignup" onclick="setMode('signup')">Create account</button>
    </div>
    <h1 id="title">Welcome back</h1>
    <p class="sub" id="sub">Log in to browse and book verified pros.</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="At least 6 characters" autocomplete="current-password">

    <button class="btn" id="goBtn" onclick="submit()">Log in</button>
    <div class="msg" id="msg"></div>
    <div class="aux" style="margin-top:14px">
      <span style="color:var(--muted)">Skilled pro? </span><a href="pro.html" style="color:var(--green);font-weight:600;text-decoration:none">Log in as a pro →</a>
    </div>
    <div class="aux">
      <button onclick="resetPass()">Forgot your password?</button>
      <button id="resendBtn" onclick="resendVerify()" style="display:none">Resend verification email</button>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  let mode = 'login';
  // already logged in AND verified? go straight to the marketplace
  auth.onAuthStateChanged(u => { if(u && (u.emailVerified || u.email === OWNER_EMAIL)) location.href = 'site.html'; });

  function setMode(m){
    mode = m;
    document.getElementById('tabLogin').classList.toggle('on', m==='login');
    document.getElementById('tabSignup').classList.toggle('on', m==='signup');
    document.getElementById('title').textContent = m==='login' ? 'Welcome back' : 'Create your account';
    document.getElementById('sub').textContent = m==='login' ? 'Log in to browse and book verified pros.' : 'One quick account and you can book any pro on Karvo.';
    document.getElementById('goBtn').textContent = m==='login' ? 'Log in' : 'Create account';
    showMsg('', '');
  }

  function showMsg(text, kind){
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (kind ? ' ' + kind : '');
  }

  function friendly(code){
    const map = {
      'auth/invalid-email':'That email address doesn\'t look right.',
      'auth/user-not-found':'No account with that email — try Create account.',
      'auth/wrong-password':'Wrong password. Try again or use "Forgot your password?".',
      'auth/invalid-credential':'Email or password is incorrect.',
      'auth/email-already-in-use':'An account with this email already exists — try Log in.',
      'auth/weak-password':'Password must be at least 6 characters.',
      'auth/too-many-requests':'Too many attempts — wait a minute and try again.'
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  let pendingUser = null;

  function submit(){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    if(!email || !pass){ showMsg('Please enter your email and password.', 'err'); return; }
    const btn = document.getElementById('goBtn');
    btn.disabled = true;
    document.getElementById('resendBtn').style.display = 'none';

    if(mode === 'signup'){
      auth.createUserWithEmailAndPassword(email, pass)
        .then(cred => cred.user.sendEmailVerification().then(() => {
          auth.signOut();
          setMode('login');
          showMsg('Account created! We\'ve emailed a verification link to ' + email + ' — click it (check your spam folder too), then log in here.', 'ok');
          btn.disabled = false;
        }))
        .catch(e => { showMsg(friendly(e.code), 'err'); btn.disabled = false; });
      return;
    }

    auth.signInWithEmailAndPassword(email, pass)
      .then(cred => {
        if(cred.user.emailVerified || cred.user.email === OWNER_EMAIL){
          location.href = 'site.html';
        } else {
          pendingUser = cred.user;
          showMsg('Your email isn\'t verified yet. Click the link we sent to ' + email + ' (check spam), then log in again.', 'err');
          document.getElementById('resendBtn').style.display = 'inline';
          auth.signOut();
          btn.disabled = false;
        }
      })
      .catch(e => { showMsg(friendly(e.code), 'err'); btn.disabled = false; });
  }

  function resendVerify(){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    if(!email || !pass){ showMsg('Enter your email and password above, then tap resend.', 'err'); return; }
    auth.signInWithEmailAndPassword(email, pass)
      .then(cred => cred.user.sendEmailVerification().then(() => {
        auth.signOut();
        showMsg('Verification email sent again to ' + email + ' — check inbox and spam.', 'ok');
      }))
      .catch(e => showMsg(friendly(e.code), 'err'));
  }

  function resetPass(){
    const email = document.getElementById('email').value.trim();
    if(!email){ showMsg('Type your email above first, then click reset.', 'err'); return; }
    auth.sendPasswordResetEmail(email)
      .then(() => showMsg('Password reset email sent — check your inbox.', 'ok'))
      .catch(e => showMsg(friendly(e.code), 'err'));
  }

  document.getElementById('password').addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });
</script>
</body>
</html>
